<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MMR Network</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f7fb;
}

header {
  background: #0a3d62;
  padding: 15px;
  text-align: center;
  color: white;
}

.container {
  max-width: 500px;
  margin: 50px auto;
  padding: 20px;
  background: white;
  border-radius: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  width: 100%;
  padding: 12px;
  background: #0a3d62;
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <h2>MMR Network Application</h2>
</header>

<div class="container">

  <form id="form">

    <input type="text" placeholder="Full Name" required>
    <input type="text" placeholder="Address" required>
    <input type="tel" placeholder="Phone" required>

    <select required>
      <option value="">Select Plan</option>
      <option>50 Mbps</option>
      <option>100 Mbps</option>
      <option>300 Mbps</option>
    </select>

    <button type="submit" id="btn">Submit Application</button>

  </form>

</div>

<script>
document.getElementById("form").addEventListener("submit", function(e) {
  e.preventDefault();

  const btn = document.getElementById("btn");

  btn.disabled = true;
  btn.innerText = "Submitted";

  setTimeout(() => {
    alert("Application submitted successfully!");
    this.reset();

    btn.disabled = false;
    btn.innerText = "Submit Application";
  }, 600);
});
</script>

</body>
</html>
