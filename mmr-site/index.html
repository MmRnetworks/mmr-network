<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Application Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f7fb;
}

header {
  background: #0a3d62;
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: 60px auto;
  padding: 20px;
  background: white;
  border-radius: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 12px;
  background: #0a3d62;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}
</style>
</head>

<body>

<header>
  <h2>Application Form</h2>
</header>

<div class="container">

  <form id="form">

    <input type="text" placeholder="Full Name" required>
    <input type="text" placeholder="Address" required>
    <input type="tel" placeholder="Phone Number" required>

    <select required>
      <option value="">Select Plan</option>
      <option>Basic</option>
      <option>Standard</option>
      <option>Premium</option>
    </select>

    <button type="submit">Submit Application</button>

  </form>

</div>

<script>
document.getElementById("form").addEventListener("submit", function(e) {
  e.preventDefault();

  // simulate success only (no backend, no requests)
  alert("Application submitted successfully!");

  this.reset();
});
</script>

</body>
</html>
