<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MMR Network</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f7fb;
}

/* HEADER */
header {
  background: #0a3d62;
  padding: 15px;
  text-align: center;
}

.logo {
  width: 200px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h1 {
  margin-bottom: 10px;
}

/* FORM */
.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  width: 100%;
  padding: 12px;
  background: #0a3d62;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

button:disabled {
  background: gray;
}
</style>
</head>

<body>

<header>
  <img src="logo.png" class="logo">
</header>

<div class="hero">
  <h1>High-Speed Internet Application</h1>
  <p>Fill out the form below</p>
</div>

<div class="container">

  <form id="applyFormData">

    <input type="text" placeholder="Full Name" required>
    <input type="text" placeholder="Address" required>
    <input type="tel" placeholder="Phone Number" required>

    <select required>
      <option value="">Select Plan</option>
      <option>50 Mbps - ₱850</option>
      <option>100 Mbps - ₱1299</option>
      <option>300 Mbps - Coming Soon</option>
    </select>

    <button type="submit" id="submitBtn">Submit Application</button>

  </form>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const form = document.getElementById("applyFormData");
  const btn = document.getElementById("submitBtn");

  form.addEventListener("submit", function (e) {
    e.preventDefault();

    btn.disabled = true;
    btn.innerText = "Submitting...";

    setTimeout(() => {
      alert("Application submitted successfully!");

      form.reset();

      btn.disabled = false;
      btn.innerText = "Submit Application";
    }, 700);
  });
});
</script>

</body>
</html>
